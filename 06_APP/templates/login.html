<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Cobranças INE-MAT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
      padding: 2.2rem 2rem 2rem;
    }
    .login-logos {
      display: flex; align-items: center; justify-content: center;
      gap: 1.4rem; margin-bottom: 1.2rem;
    }
    .login-logos img { height: 40px; object-fit: contain; }
    .login-title {
      text-align: center; font-weight: 700; color: #1a1a2e;
      font-size: 1.15rem; letter-spacing: .02em; margin-bottom: .25rem;
    }
    .login-sub {
      text-align: center; color: #8a8a9a; font-size: .82rem; margin-bottom: 1.5rem;
    }
    .form-label { font-size: .85rem; font-weight: 600; color: #444; }
    .btn-entrar {
      background: #1a1a2e; color: #fff; font-weight: 600;
      border: none; border-radius: 10px; padding: .6rem;
    }
    .btn-entrar:hover { background: #2a2a44; color: #fff; }
    .input-group-text { background: #f5f6fa; border-right: none; color: #888; }
    .input-group .form-control { border-left: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logos">
      <img src="{{ url_for('static', filename='logo-ineprotec.png') }}" alt="Ineprotec">
      <img src="{{ url_for('static', filename='logo-matriculaead.png') }}" alt="Matrícula EaD">
    </div>
    <div class="login-title">Cobranças INE-MAT</div>
    <div class="login-sub">Acesso restrito ao setor financeiro</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 px-3 mb-3" style="font-size:.85rem">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" data-loading>
      <div class="mb-3">
        <label class="form-label" for="usuario">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="usuario" name="usuario"
                 autocomplete="username" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="senha">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="senha" name="senha"
                 autocomplete="current-password" required>
        </div>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-entrar" data-loading-text="Entrando...">
          <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
        </button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  document.addEventListener('submit', function (e) {
    const form = e.target;
    if (!(form instanceof HTMLFormElement) || !form.hasAttribute('data-loading')) return;
    const btn = form.querySelector('button[type="submit"]');
    if (!btn || btn.disabled) return;
    const txt = btn.getAttribute('data-loading-text') || 'Processando...';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>' + txt;
  }, true);
  </script>
</body>
</html>
